<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英語語順トレーニング</title>
    <style>
        :root {
            --primary: #2c3e50; --accent: #3498db; --success: #27ae60;
            --error: #e74c3c; --hint: #e67e22; --bg: #f0f2f5; --card: #ffffff;
        }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; overflow-x: hidden; }
        .main-wrapper { width: 95%; max-width: 1400px; margin: 20px; display: flex; flex-direction: column; gap: 20px; position: relative; }
        .card { background: var(--card); border-radius: 15px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        
        /* 進捗バー */
        .progress-container { background: #eee; border-radius: 10px; height: 25px; width: 100%; margin: 10px 0; overflow: hidden; position: relative; }
        .progress-bar { background: var(--success); height: 100%; width: 0%; transition: width 0.3s ease; }
        .progress-text { position: absolute; width: 100%; text-align: center; line-height: 25px; font-size: 0.85rem; font-weight: bold; color: #333; }

        /* フィルタセクション */
        .filter-section { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .filter-group { border: 1px solid #ddd; border-radius: 10px; padding: 15px; background: #fff; }
        .group-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 2px solid #f0f0f0; padding-bottom: 5px; }
        .group-header h3 { margin: 0; font-size: 1.1rem; }
        .checkbox-list { max-height: 200px; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; }
        .checkbox-item { display: flex; align-items: center; justify-content: space-between; font-size: 0.9rem; padding: 3px 0; }
        
        /* 進捗一覧表 */
        .status-table-wrapper { margin-top: 30px; overflow-x: auto; }
        .status-table { width: 100%; border-collapse: collapse; background: #fff; font-size: 0.85rem; min-width: 500px; }
        .status-table th, .status-table td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        .status-table th { background: #f8f9fa; color: var(--primary); }
        .status-table .cat-name { text-align: left; font-weight: bold; background: #fcfcfc; min-width: 150px; }
        .cell-perfect { background-color: #e8f5e9 !important; color: #2e7d32; font-weight: bold; }
        .cell-zero { color: #ccc; }

        /* クイズ画面 */
        #quiz-screen, #result-screen { display: none; flex-direction: column; gap: 20px; }
        .japanese-box { font-size: 1.8rem; font-weight: bold; color: var(--primary); text-align: center; padding: 45px; background: #fff; border-radius: 15px; border-bottom: 5px solid var(--accent); }
        
        .slot-container { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; margin: 15px 0; }
        .slot { background: #fafafa; border: 2px dashed #bdc3c7; border-radius: 12px; min-height: 110px; padding: 10px; display: flex; flex-wrap: wrap; align-content: flex-start; gap: 8px; cursor: pointer; transition: 0.2s; }
        .slot:hover { background: #f0f7ff; border-color: var(--accent); }
        .slot-label { width: 100%; font-size: 0.75rem; color: #7f8c8d; text-align: center; margin-bottom: 8px; background: #eee; padding: 4px 0; border-radius: 4px; font-weight: bold; pointer-events: none; }
        
        .model-answer-section { display: none; background: #fff3e0; border: 2px solid var(--hint); border-radius: 15px; padding: 15px; margin-bottom: 10px; }
        .model-answer-label { font-weight: bold; color: var(--hint); margin-bottom: 10px; text-align: center; }

        .piece-container { background: #dfe6e9; padding: 25px; border-radius: 15px; display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; min-height: 100px; }
        .piece-wrapper { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; }
        .piece { background: var(--accent); color: white; padding: 10px 18px; border-radius: 8px; font-weight: bold; box-shadow: 0 4px 0 #2980b9; font-size: 1.1rem; user-select: none; transition: 0.2s; }
        .active-piece .piece { transform: translateY(-5px); box-shadow: 0 10px 15px rgba(52, 152, 219, 0.4); border: 2px solid white; background: #2980b9; }
        .hint-label { font-size: 0.75rem; color: var(--hint); font-weight: bold; background: #fff; padding: 1px 6px; border-radius: 4px; border: 1px solid var(--hint); pointer-events: none; }

        .action-bar { display: flex; justify-content: center; gap: 15px; margin-top: 15px; }
        .btn { padding: 12px 35px; border: none; border-radius: 30px; cursor: pointer; font-size: 1.1rem; font-weight: bold; transition: 0.2s; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-success { background: var(--success); color: white; width: 250px; }
        .btn-hint { background: var(--hint); color: white; }
        .btn-next { background: var(--primary); color: white; }
        .btn-outline { background: transparent; border: 2px solid var(--accent); color: var(--accent); }
        .btn-text { font-size: 0.75rem; color: var(--accent); background: none; border: none; cursor: pointer; text-decoration: underline; padding: 0; }
        .btn-text-danger { font-size: 0.75rem; color: var(--error); background: none; border: none; cursor: pointer; text-decoration: underline; padding: 0; }

        .result-item { border-bottom: 2px solid #eee; padding: 20px 0; }
        .result-jp { font-weight: bold; color: var(--primary); margin-bottom: 8px; font-size: 1.1rem; }
        .result-en { color: var(--success); font-size: 1.2rem; font-weight: bold; }

        #confetti-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; }
    </style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<div class="main-wrapper">
    <div id="home-screen" class="card">
        <h1>英語語順トレーニング</h1>
        <div style="margin-bottom: 20px;">
            <div style="display:flex; justify-content: space-between; align-items: flex-end;">
                <span style="font-weight:bold; font-size:0.9rem;">現在の選択範囲の達成状況</span>
                <span id="progress-stats" style="font-size:0.8rem; color:#666;">0 / 0 問完了 (0%)</span>
            </div>
            <div class="progress-container">
                <div id="main-progress-bar" class="progress-bar"></div>
                <div id="main-progress-text" class="progress-text">0%</div>
            </div>
        </div>

        <div class="filter-section">
            <div class="filter-group"><div class="group-header"><h3>学年</h3></div><div id="filter-grade" class="checkbox-list"></div></div>
            <div class="filter-group">
                <div class="group-header"><h3>文法項目</h3><div style="display:flex; gap:8px;"><button class="btn-text" onclick="toggleAll('cat', true)">全選択</button><button class="btn-text" onclick="toggleAll('cat', false)">全解除</button></div></div>
                <div id="filter-cat" class="checkbox-list"></div>
                <div style="margin-top:10px; text-align:right;"><button class="btn-text-danger" onclick="resetFilteredProgress()">選択中の範囲の記録をリセット</button></div>
            </div>
            <div class="filter-group"><div class="group-header"><h3>レベル</h3></div><div id="filter-lv" class="checkbox-list"></div></div>
        </div>

        <div class="action-bar" style="flex-wrap: wrap;">
            <button class="btn btn-primary" onclick="startLesson('sort')">10問並べ替え開始</button>
            <button class="btn btn-success" style="background:var(--primary);" onclick="startLesson('writing')">10問書き取り練習</button>
            <div style="width:100%; display:flex; justify-content:center; gap:15px; margin-top:10px;">
                <button class="btn btn-outline" onclick="exportData()">記録保存</button>
                <button class="btn btn-outline" onclick="importData()">記録読込</button>
            </div>
        </div>

        <div class="status-table-wrapper">
            <h3 style="margin-bottom:10px; font-size:1rem; border-left:4px solid var(--accent); padding-left:10px;">文法項目×レベル別 達成状況</h3>
            <table class="status-table" id="matrix-table">
                <thead><tr id="matrix-head"></tr></thead>
                <tbody id="matrix-body"></tbody>
            </table>
        </div>
    </div>

    <div id="quiz-screen">
        <div style="display:flex; justify-content: space-between; align-items:center;">
            <button class="btn-mini-reset" style="padding:8px 15px;" onclick="location.reload()">◀ ホーム</button>
            <div id="quiz-counter" style="font-weight:bold;">1 / 10</div>
            <button class="btn btn-hint sort-only" id="hint-btn" onclick="applyHint()">ヒント</button>
        </div>
        <div id="feedback" style="text-align:center; font-size:1.8rem; font-weight:bold; height:40px;"></div>
        
        <div id="model-answer-section" class="model-answer-section">
            <div class="model-answer-label">【模範解答】</div>
            <div class="slot-container" id="model-drop-area">
                <div class="slot"><div class="slot-label">⓪疑問文のとき</div></div>
                <div class="slot"><div class="slot-label">①だれは/何は</div></div>
                <div class="slot"><div class="slot-label">②どうする/=</div></div>
                <div class="slot"><div class="slot-label">③何を/何</div></div>
                <div class="slot"><div class="slot-label">④いつ・どこで…</div></div>
            </div>
        </div>

        <div class="japanese-box" id="japanese-text"></div>
        
        <div id="sort-area" class="sort-only">
            <div style="text-align:center; font-weight:bold; color:var(--primary); margin-top:10px;">【あなたの解答】</div>
            <div class="slot-container" id="drop-area">
                <div class="slot" data-col="G" onclick="handleSlotClick(this)"><div class="slot-label">⓪疑問文のとき</div></div>
                <div class="slot" data-col="H" onclick="handleSlotClick(this)"><div class="slot-label">①だれは/何は</div></div>
                <div class="slot" data-col="I" onclick="handleSlotClick(this)"><div class="slot-label">②どうする/=</div></div>
                <div class="slot" data-col="J" onclick="handleSlotClick(this)"><div class="slot-label">③何を/何</div></div>
                <div class="slot" data-col="K" onclick="handleSlotClick(this)"><div class="slot-label">④いつ・どこで・どのように</div></div>
            </div>
            <div class="piece-container" id="piece-area" onclick="handleSlotClick(this)"></div>
        </div>

        <div id="writing-msg" style="display:none; text-align:center; color:#666; margin-top:20px; font-style:italic;">
            ノートに英文を書いてから「次の問題へ」を押してください。
        </div>

        <div class="action-bar">
            <button id="check-btn" class="btn btn-success sort-only" onclick="checkAnswer()">答え合わせ</button>
            <button id="next-btn" class="btn btn-next" onclick="goToNextQuestion()" style="display:none;">次の問題へ ▶</button>
        </div>
    </div>

    <div id="result-screen" class="card">
        <h2 style="text-align:center;">書き取り練習 結果一覧</h2>
        <div id="result-list"></div>
        <div class="action-bar"><button class="btn btn-primary" onclick="location.reload()">ホームへ戻る</button></div>
    </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxRSBn90LvvtW4IYmj5PZPDV1AhuUXQgitbFl_OAnyt86wozd5CPvWsql-U6b9OcBjNfQ/exec';
let database = [];
let studyLogs = JSON.parse(localStorage.getItem('eng_v5_logs')) || {};
let currentSession = [];
let currentIndex = 0;
let isHintUsed = false;
let currentMode = 'sort';
let activePieceWrapper = null;
let confettiActive = false;

// --- 紙吹雪 ---
const canvas = document.getElementById('confetti-canvas');
const ctx = canvas.getContext('2d');
let particles = [];
function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resizeCanvas); resizeCanvas();
class Particle {
    constructor() {
        this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height - canvas.height;
        this.size = Math.random() * 8 + 4; this.speedY = Math.random() * 4 + 2; this.speedX = Math.random() * 2 - 1;
        this.color = `hsl(${Math.random() * 360}, 75%, 60%)`; this.rotation = Math.random() * 360; this.rotationSpeed = Math.random() * 8 - 4; this.life = 1.0;
    }
    update() { this.y += this.speedY; this.x += this.speedX; this.rotation += this.rotationSpeed; this.life -= 0.005; }
    draw() { ctx.save(); ctx.globalAlpha = this.life; ctx.translate(this.x, this.y); ctx.rotate(this.rotation * Math.PI / 180); ctx.fillStyle = this.color; ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size); ctx.restore(); }
}
function launchConfetti() { particles = []; confettiActive = true; for (let i = 0; i < 70; i++) particles.push(new Particle()); animateConfetti(); }
function stopConfetti() { confettiActive = false; particles = []; ctx.clearRect(0, 0, canvas.width, canvas.height); }
function animateConfetti() { if(!confettiActive) return; ctx.clearRect(0, 0, canvas.width, canvas.height); particles.forEach((p, i) => { p.update(); p.draw(); if (p.y > canvas.height || p.life <= 0) particles.splice(i, 1); }); if (particles.length > 0) requestAnimationFrame(animateConfetti); else confettiActive = false; }

// --- ロジック ---
async function loadData() {
    try {
        const res = await fetch(GAS_URL);
        database = await res.json();
        setupFilters();
        updateProgress();
    } catch (e) { console.error(e); }
}

function setupFilters() {
    const savedFilters = JSON.parse(localStorage.getItem('eng_v5_filter_settings')) || {};
    const types = { grade: 'filter-grade', cat: 'filter-cat', lv: 'filter-lv' };
    Object.keys(types).forEach(key => {
        const container = document.getElementById(types[key]);
        const items = [...new Set(database.map(d => String(d[key] || "").trim()))].filter(v => v !== "");
        container.innerHTML = ""; 
        items.forEach(item => {
            const div = document.createElement('div');
            div.className = 'checkbox-item';
            const isChecked = savedFilters[key] ? savedFilters[key].includes(item) : true;
            div.innerHTML = `<label><input type="checkbox" value="${item}" ${isChecked ? "checked" : ""} data-type="${key}" onchange="onFilterChange()"> ${item}</label>`;
            container.appendChild(div);
        });
    });
}

function onFilterChange() { 
    const settings = {
        grade: Array.from(document.querySelectorAll('input[data-type="grade"]:checked')).map(i => i.value),
        cat: Array.from(document.querySelectorAll('input[data-type="cat"]:checked')).map(i => i.value),
        lv: Array.from(document.querySelectorAll('input[data-type="lv"]:checked')).map(i => i.value)
    };
    localStorage.setItem('eng_v5_filter_settings', JSON.stringify(settings));
    updateProgress(); 
}

function updateProgress() {
    const getSel = (t) => Array.from(document.querySelectorAll(`input[data-type="${t}"]:checked`)).map(i => i.value);
    const pool = database.filter(d => getSel('grade').includes(String(d.grade).trim()) && getSel('cat').includes(String(d.cat).trim()) && getSel('lv').includes(String(d.lv).trim()));
    if (pool.length > 0) {
        const completedCount = pool.filter(d => studyLogs[d.id] && studyLogs[d.id].streak >= 2).length;
        const percent = Math.floor((completedCount / pool.length) * 100);
        document.getElementById('main-progress-bar').style.width = `${percent}%`;
        document.getElementById('main-progress-text').innerText = `${percent}%`;
        document.getElementById('progress-stats').innerText = `${completedCount} / ${pool.length} 問完了 (${percent}%)`;
    } else {
        document.getElementById('progress-stats').innerText = "0 / 0 問完了 (0%)";
    }
    renderMatrix();
}

function renderMatrix() {
    const head = document.getElementById('matrix-head');
    const body = document.getElementById('matrix-body');
    const cats = [...new Set(database.map(d => String(d.cat).trim()))].sort();
    const lvs = [...new Set(database.map(d => String(d.lv).trim()))].sort((a,b) => a.localeCompare(b, undefined, {numeric: true}));
    head.innerHTML = `<th>文法項目</th>` + lvs.map(l => `<th>${l}</th>`).join('');
    body.innerHTML = cats.map(cat => {
        let row = `<tr><td class="cat-name">${cat}</td>`;
        lvs.forEach(lv => {
            const cellPool = database.filter(d => String(d.cat).trim() === cat && String(d.lv).trim() === lv);
            if (cellPool.length === 0) row += `<td>-</td>`;
            else {
                const done = cellPool.filter(d => studyLogs[d.id] && studyLogs[d.id].streak >= 2).length;
                const pct = Math.floor((done / cellPool.length) * 100);
                row += `<td class="${pct===100?'cell-perfect':(done===0?'cell-zero':'')}">${done}/${cellPool.length}<br><small>${pct}%</small></td>`;
            }
        });
        return row + `</tr>`;
    }).join('');
}

function startLesson(mode) {
    currentMode = mode;
    const getSel = (t) => Array.from(document.querySelectorAll(`input[data-type="${t}"]:checked`)).map(i => i.value);
    const filterPool = database.filter(d => getSel('grade').includes(String(d.grade).trim()) && getSel('cat').includes(String(d.cat).trim()) && getSel('lv').includes(String(d.lv).trim()));
    
    if(!filterPool.length) return alert("条件に合う問題がありません。");

    if(mode === 'sort') {
        const c0 = filterPool.filter(d => (studyLogs[d.id]?.streak || 0) === 0).sort(() => Math.random() - 0.5);
        const c1 = filterPool.filter(d => (studyLogs[d.id]?.streak || 0) === 1).sort(() => Math.random() - 0.5);
        currentSession = [...c0];
        if (currentSession.length < 10) currentSession = [...currentSession, ...c1.slice(0, 10 - currentSession.length)];
        else currentSession = currentSession.slice(0, 10);
        if(!currentSession.length) return alert("未完了の問題がありません！");
    } else {
        currentSession = filterPool.sort(() => Math.random() - 0.5).slice(0, 10);
    }
    
    currentIndex = 0;
    document.getElementById('home-screen').style.display='none';
    document.getElementById('quiz-screen').style.display='flex';
    document.getElementById('result-screen').style.display='none';
    showQuestion();
}

function showQuestion() {
    stopConfetti();
    activePieceWrapper = null;
    const q = currentSession[currentIndex];
    isHintUsed = false;
    
    document.getElementById('quiz-counter').innerText = `${currentIndex + 1} / ${currentSession.length}`;
    document.getElementById('japanese-text').innerText = q.E;
    document.getElementById('feedback').innerText = "";
    document.getElementById('model-answer-section').style.display = "none";
    
    const sortOnlyEls = document.querySelectorAll('.sort-only');
    const writingMsg = document.getElementById('writing-msg');
    const nextBtn = document.getElementById('next-btn');
    const checkBtn = document.getElementById('check-btn');

    if(currentMode === 'sort') {
        sortOnlyEls.forEach(el => el.style.display = '');
        writingMsg.style.display = 'none';
        nextBtn.style.display = 'none';
        checkBtn.style.display = 'block';
        document.getElementById('hint-btn').style.display = 'block';

        // スロットの中身だけを掃除し、ラベルを残す
        document.querySelectorAll('#drop-area .slot').forEach(s => {
            const wrappers = s.querySelectorAll('.piece-wrapper');
            wrappers.forEach(w => w.remove());
        });
        const area = document.getElementById('piece-area');
        area.innerHTML = "";
        let rawWords = [];
        q.D.split(' ').forEach(item => { item.split(':')[0].split('_').forEach(w => rawWords.push(w)); });
        rawWords.sort(()=>Math.random()-0.5).forEach(w => createPiece(w, area, false));
    } else {
        sortOnlyEls.forEach(el => el.style.display = 'none');
        writingMsg.style.display = 'block';
        nextBtn.style.display = 'block';
        checkBtn.style.display = 'none';
    }
}

function createPiece(text, target, hasHint, hintText = "") {
    const wrapper = document.createElement('div');
    wrapper.className = 'piece-wrapper';
    wrapper.onclick = (e) => { e.stopPropagation(); handlePieceClick(wrapper); };
    const p = document.createElement('div'); p.className = 'piece'; p.innerText = text; 
    wrapper.appendChild(p);
    if(hasHint && hintText) {
        const h = document.createElement('div'); h.className = 'hint-label'; h.innerText = hintText;
        wrapper.appendChild(h);
    }
    target.appendChild(wrapper);
}

function handlePieceClick(wrapper) {
    if (wrapper.parentElement.classList.contains('slot')) {
        document.getElementById('piece-area').appendChild(wrapper);
        if (activePieceWrapper === wrapper) { activePieceWrapper.classList.remove('active-piece'); activePieceWrapper = null; }
        return;
    }
    if (activePieceWrapper) activePieceWrapper.classList.remove('active-piece');
    activePieceWrapper = wrapper; activePieceWrapper.classList.add('active-piece');
}

function handleSlotClick(targetZone) {
    if (!activePieceWrapper) return;
    targetZone.appendChild(activePieceWrapper);
    activePieceWrapper.classList.remove('active-piece'); activePieceWrapper = null;
}

function checkAnswer() {
    if (currentMode !== 'sort') return;
    const q = currentSession[currentIndex];
    const slots = document.querySelectorAll('#drop-area .slot');
    const cols = ['G', 'H', 'I', 'J', 'K'];
    let correct = true;
    cols.forEach((col, idx) => {
        const ans = Array.from(slots[idx].querySelectorAll('.piece')).map(p => p.innerText).join(' ').trim().toLowerCase();
        if (ans !== String(q[col]||"").trim().toLowerCase()) correct = false;
    });

    const fb = document.getElementById('feedback');
    if (correct) {
        fb.innerText = "⭕ 正解！"; fb.style.color = "var(--success)"; launchConfetti();
        if (!isHintUsed) { if(!studyLogs[q.id]) studyLogs[q.id]={streak:0}; studyLogs[q.id].streak++; }
        localStorage.setItem('eng_v5_logs', JSON.stringify(studyLogs));
        setTimeout(goToNextQuestion, 1500);
    } else {
        fb.innerText = "❌ 不正解"; fb.style.color = "var(--error)";
        if(studyLogs[q.id]) studyLogs[q.id].streak = 0;
        localStorage.setItem('eng_v5_logs', JSON.stringify(studyLogs));
        showModelAnswer(q); 
    }
}

function showModelAnswer(q) {
    const modelSlots = document.querySelectorAll('#model-drop-area .slot');
    const cols = ['G', 'H', 'I', 'J', 'K'];
    const definedPieces = q.D.split(' ').map(item => { const [phrase, hint] = item.split(':'); return { text: phrase.replace(/_/g, ' ').trim(), hint: hint || "" }; });
    
    cols.forEach((col, idx) => {
        const label = modelSlots[idx].querySelector('.slot-label');
        modelSlots[idx].innerHTML = ""; modelSlots[idx].appendChild(label);
        let targetSentence = String(q[col]||"").trim();
        if (!targetSentence) return;
        let matchedPieces = [];
        const sortedDefinitions = [...definedPieces].sort((a,b) => b.text.length - a.text.length);
        while (targetSentence.length > 0) {
            let found = false;
            for (let p of sortedDefinitions) {
                const regex = new RegExp('^' + p.text.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'i');
                if (regex.test(targetSentence)) { matchedPieces.push(p); targetSentence = targetSentence.substring(p.text.length).trim(); found = true; break; }
            }
            if (!found) { matchedPieces.push({ text: targetSentence, hint: "" }); targetSentence = ""; }
        }
        matchedPieces.forEach(p => {
            const wrapper = document.createElement('div'); wrapper.className = 'piece-wrapper';
            const div = document.createElement('div'); div.className = 'piece'; div.innerText = p.text; wrapper.appendChild(div);
            if(p.hint){ const h = document.createElement('div'); h.className = 'hint-label'; h.innerText = p.hint; wrapper.appendChild(h); }
            modelSlots[idx].appendChild(wrapper);
        });
    });
    document.getElementById('model-answer-section').style.display = "block";
    document.getElementById('check-btn').style.display = "none";
    document.getElementById('next-btn').style.display = "block";
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goToNextQuestion() {
    stopConfetti();
    if(++currentIndex < currentSession.length) {
        showQuestion();
    } else {
        if(currentMode === 'writing') showFinalResults();
        else { alert("10問終了！"); location.reload(); }
    }
}

function showFinalResults() {
    document.getElementById('quiz-screen').style.display = 'none';
    const resultScreen = document.getElementById('result-screen');
    const resultList = document.getElementById('result-list');
    resultScreen.style.display = 'flex';
    resultList.innerHTML = "";
    currentSession.forEach(q => {
        const fullEn = [q.G, q.H, q.I, q.J, q.K].filter(v => v).join(' ');
        const item = document.createElement('div'); item.className = 'result-item';
        item.innerHTML = `<div class="result-jp">${q.E}</div><div class="result-en">${fullEn}</div>`;
        resultList.appendChild(item);
    });
}

function applyHint() {
    isHintUsed = true;
    const q = currentSession[currentIndex];
    const area = document.getElementById('piece-area');
    document.querySelectorAll('#drop-area .slot').forEach(s => {
        const wrappers = s.querySelectorAll('.piece-wrapper');
        wrappers.forEach(w => w.remove());
    });
    area.innerHTML = "";
    q.D.split(' ').sort(()=>Math.random()-0.5).forEach(item => { const [phrase, trans] = item.split(':'); createPiece(phrase.replace(/_/g, ' '), area, true, trans || ""); });
    document.getElementById('hint-btn').style.display = "none";
}

function exportData() {
    const dataStr = JSON.stringify(studyLogs, null, 2);
    const blob = new Blob([dataStr], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = `record.json`; a.click();
}

function importData() {
    const input = document.createElement('input'); input.type = 'file'; input.accept = '.json';
    input.onchange = e => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = event => {
            studyLogs = JSON.parse(event.target.result);
            localStorage.setItem('eng_v5_logs', JSON.stringify(studyLogs));
            location.reload();
        };
        reader.readAsText(file);
    };
    input.click();
}

function resetFilteredProgress() {
    const getSel = (t) => Array.from(document.querySelectorAll(`input[data-type="${t}"]:checked`)).map(i => i.value);
    if (!getSel('grade').length || !getSel('cat').length || !getSel('lv').length) return alert("条件をすべて選択してください。");
    if (!confirm("リセットしますか？")) return;
    database.forEach(d => {
        if (getSel('grade').includes(String(d.grade).trim()) && getSel('cat').includes(String(d.cat).trim()) && getSel('lv').includes(String(d.lv).trim())) {
            if (studyLogs[d.id]) studyLogs[d.id].streak = 0;
        }
    });
    localStorage.setItem('eng_v5_logs', JSON.stringify(studyLogs));
    updateProgress();
}

function toggleAll(type, isCheck) {
    document.querySelectorAll(`input[data-type="${type}"]`).forEach(b => b.checked = isCheck);
    onFilterChange();
}

window.onload = loadData;
</script>
</body>
</html>
