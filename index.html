<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英語語順トレーニング</title>
    <style>
        :root {
            --primary: #2c3e50; --accent: #3498db; --success: #27ae60;
            --error: #e74c3c; --hint: #e67e22; --bg: #f0f2f5; --card: #ffffff;
        }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; }
        .main-wrapper { width: 95%; max-width: 1400px; margin: 20px; display: flex; flex-direction: column; gap: 20px; }
        .card { background: var(--card); border-radius: 15px; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        
        .progress-container { background: #eee; border-radius: 10px; height: 25px; width: 100%; margin: 10px 0; overflow: hidden; position: relative; }
        .progress-bar { background: var(--success); height: 100%; width: 0%; transition: width 0.3s ease; }
        .progress-text { position: absolute; width: 100%; text-align: center; line-height: 25px; font-size: 0.85rem; font-weight: bold; color: #333; }

        .filter-section { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .filter-group { border: 1px solid #ddd; border-radius: 10px; padding: 15px; background: #fff; }
        .group-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 2px solid #f0f0f0; padding-bottom: 5px; }
        .group-header h3 { margin: 0; font-size: 1.1rem; }
        
        .checkbox-list { max-height: 200px; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; }
        .checkbox-item { display: flex; align-items: center; justify-content: space-between; font-size: 0.9rem; padding: 3px 0; }
        
        #quiz-screen { display: none; flex-direction: column; gap: 20px; }
        .japanese-box { font-size: 1.8rem; font-weight: bold; color: var(--primary); text-align: center; padding: 35px; background: #fff; border-radius: 15px; border-bottom: 5px solid var(--accent); }
        .slot-container { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; margin: 15px 0; }
        .slot { background: #fafafa; border: 2px dashed #bdc3c7; border-radius: 12px; min-height: 110px; padding: 10px; display: flex; flex-wrap: wrap; align-content: flex-start; gap: 8px; }
        .slot-label { width: 100%; font-size: 0.8rem; color: #7f8c8d; text-align: center; margin-bottom: 8px; background: #eee; padding: 2px 0; border-radius: 4px; }
        
        .model-answer-section { display: none; background: #fff3e0; border: 2px solid var(--hint); border-radius: 15px; padding: 15px; margin-bottom: 10px; }
        .model-answer-label { font-weight: bold; color: var(--hint); margin-bottom: 10px; text-align: center; }

        .piece-container { background: #dfe6e9; padding: 25px; border-radius: 15px; display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; min-height: 100px; }
        .piece-wrapper { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .piece { background: var(--accent); color: white; padding: 10px 18px; border-radius: 8px; cursor: grab; font-weight: bold; box-shadow: 0 4px 0 #2980b9; font-size: 1.1rem; user-select: none; }
        .dragging { opacity: 0.3; }
        .hint-label { font-size: 0.75rem; color: var(--hint); font-weight: bold; background: #fff; padding: 1px 6px; border-radius: 4px; border: 1px solid var(--hint); }

        .action-bar { display: flex; justify-content: center; gap: 15px; margin-top: 15px; }
        .btn { padding: 12px 35px; border: none; border-radius: 30px; cursor: pointer; font-size: 1.1rem; font-weight: bold; transition: 0.2s; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-success { background: var(--success); color: white; width: 250px; }
        .btn-hint { background: var(--hint); color: white; }
        .btn-next { background: var(--primary); color: white; display: none; }
        .btn-outline { background: transparent; border: 2px solid var(--accent); color: var(--accent); }
        .btn-mini-reset { font-size: 0.7rem; padding: 2px 6px; border: 1px solid var(--error); color: var(--error); background: none; border-radius: 4px; cursor: pointer; }
        .btn-text { font-size: 0.75rem; color: var(--accent); background: none; border: none; cursor: pointer; text-decoration: underline; padding: 0; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div id="home-screen" class="card">
        <h1>英語語順トレーニング</h1>
        <div style="margin-bottom: 20px;">
            <div style="display:flex; justify-content: space-between; align-items: flex-end;">
                <span style="font-weight:bold; font-size:0.9rem;">現在の選択範囲の達成状況</span>
                <span id="progress-stats" style="font-size:0.8rem; color:#666;">0 / 0 問完了</span>
            </div>
            <div class="progress-container">
                <div id="main-progress-bar" class="progress-bar"></div>
                <div id="main-progress-text" class="progress-text">0%</div>
            </div>
        </div>
        <div class="filter-section">
            <div class="filter-group"><div class="group-header"><h3>学年</h3></div><div id="filter-grade" class="checkbox-list"></div></div>
            <div class="filter-group">
                <div class="group-header"><h3>文法項目</h3><div><button class="btn-text" onclick="toggleAll('cat', true)">全選択</button><button class="btn-text" onclick="toggleAll('cat', false)">全解除</button></div></div>
                <div id="filter-cat" class="checkbox-list"></div>
            </div>
            <div class="filter-group"><div class="group-header"><h3>レベル</h3></div><div id="filter-lv" class="checkbox-list"></div></div>
        </div>
        <div class="action-bar">
            <button class="btn btn-primary" onclick="startLesson()">10問学習開始</button>
            <button class="btn btn-outline" onclick="exportData()">記録保存</button>
            <button class="btn btn-outline" onclick="importData()">記録読込</button>
        </div>
    </div>

    <div id="quiz-screen">
        <div style="display:flex; justify-content: space-between; align-items:center;">
            <button class="btn-mini-reset" style="padding:8px 15px;" onclick="location.reload()">◀ ホーム</button>
            <div id="quiz-counter" style="font-weight:bold;">1 / 10</div>
            <button class="btn btn-hint" id="hint-btn" onclick="applyHint()">ヒント</button>
        </div>

        <div id="feedback" style="text-align:center; font-size:1.8rem; font-weight:bold; height:40px;"></div>

        <div id="model-answer-section" class="model-answer-section">
            <div class="model-answer-label">【模範解答】</div>
            <div class="slot-container" id="model-drop-area">
                <div class="slot"><div class="slot-label">⓪</div></div>
                <div class="slot"><div class="slot-label">①</div></div>
                <div class="slot"><div class="slot-label">②</div></div>
                <div class="slot"><div class="slot-label">③</div></div>
                <div class="slot"><div class="slot-label">④</div></div>
            </div>
        </div>

        <div class="japanese-box" id="japanese-text"></div>
        <div style="text-align:center; font-weight:bold; color:var(--primary); margin-top:10px;" id="my-answer-label">【あなたの解答】</div>
        <div class="slot-container" id="drop-area">
            <div class="slot" data-col="G"><div class="slot-label">⓪</div></div>
            <div class="slot" data-col="H"><div class="slot-label">①</div></div>
            <div class="slot" data-col="I"><div class="slot-label">②</div></div>
            <div class="slot" data-col="J"><div class="slot-label">③</div></div>
            <div class="slot" data-col="K"><div class="slot-label">④</div></div>
        </div>

        <div class="piece-container" id="piece-area"></div>
        <div class="action-bar">
            <button id="check-btn" class="btn btn-success" onclick="checkAnswer()">答え合わせ</button>
            <button id="next-btn" class="btn btn-next" onclick="goToNextQuestion()">次の問題へ ▶</button>
        </div>
    </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwgvqpHv4geAn0teXND2VznbOlWYKqAtllYZLdk5KRaHL_48Eeo1MiHChLCgdYtG_7XWQ/exec';

let database = [];
let studyLogs = JSON.parse(localStorage.getItem('eng_v5_logs')) || {};
let currentSession = [];
let currentIndex = 0;
let isHintUsed = false;

async function loadData() {
    try {
        const res = await fetch(GAS_URL);
        database = await res.json();
        setupFilters();
        updateProgress();
    } catch (e) { alert("データ読み込み失敗。"); }
}

function setupFilters() {
    const savedFilters = JSON.parse(localStorage.getItem('eng_v5_filter_settings')) || {};
    const types = { grade: 'filter-grade', cat: 'filter-cat', lv: 'filter-lv' };
    Object.keys(types).forEach(key => {
        const container = document.getElementById(types[key]);
        const items = [...new Set(database.map(d => String(d[key] || "").trim()))].filter(v => v !== "");
        container.innerHTML = ""; 
        items.forEach(item => {
            const div = document.createElement('div');
            div.className = 'checkbox-item';
            const isChecked = savedFilters[key] ? savedFilters[key].includes(item) : true;
            div.innerHTML = `<label><input type="checkbox" value="${item}" ${isChecked ? "checked" : ""} data-type="${key}" onchange="onFilterChange()"> ${item}</label>`;
            container.appendChild(div);
        });
    });
}

function onFilterChange() { saveFilterSettings(); updateProgress(); }
function saveFilterSettings() {
    const settings = {
        grade: Array.from(document.querySelectorAll('input[data-type="grade"]:checked')).map(i => i.value),
        cat: Array.from(document.querySelectorAll('input[data-type="cat"]:checked')).map(i => i.value),
        lv: Array.from(document.querySelectorAll('input[data-type="lv"]:checked')).map(i => i.value)
    };
    localStorage.setItem('eng_v5_filter_settings', JSON.stringify(settings));
}

function updateProgress() {
    const getSel = (t) => Array.from(document.querySelectorAll(`input[data-type="${t}"]:checked`)).map(i => i.value);
    const pool = database.filter(d => getSel('grade').includes(String(d.grade).trim()) && getSel('cat').includes(String(d.cat).trim()) && getSel('lv').includes(String(d.lv).trim()));
    if (!pool.length) return;
    const completedCount = pool.filter(d => studyLogs[d.id] && studyLogs[d.id].streak >= 2).length;
    const percent = Math.floor((completedCount / pool.length) * 100);
    document.getElementById('main-progress-bar').style.width = `${percent}%`;
    document.getElementById('main-progress-text').innerText = `${percent}%`;
    document.getElementById('progress-stats').innerText = `${completedCount} / ${pool.length} 問完了`;
}

function toggleAll(type, isCheck) {
    document.querySelectorAll(`input[data-type="${type}"]`).forEach(b => b.checked = isCheck);
    onFilterChange();
}

function startLesson() {
    const getSel = (t) => Array.from(document.querySelectorAll(`input[data-type="${t}"]:checked`)).map(i => i.value);
    const pool = database.filter(d => getSel('grade').includes(String(d.grade).trim()) && getSel('cat').includes(String(d.cat).trim()) && getSel('lv').includes(String(d.lv).trim()));
    if(!pool.length) return alert("範囲を選択してください");
    pool.sort((a,b) => (studyLogs[a.id]?.streak||0) - (studyLogs[b.id]?.streak||0));
    currentSession = pool.slice(0,10).sort(()=>Math.random()-0.5);
    currentIndex = 0;
    document.getElementById('home-screen').style.display='none';
    document.getElementById('quiz-screen').style.display='flex';
    showQuestion();
}

function showQuestion() {
    const q = currentSession[currentIndex];
    isHintUsed = false;
    document.getElementById('quiz-counter').innerText = `${currentIndex + 1} / ${currentSession.length}`;
    document.getElementById('japanese-text').innerText = q.E;
    document.getElementById('feedback').innerText = "";
    document.getElementById('model-answer-section').style.display = "none";
    document.getElementById('next-btn').style.display = "none";
    document.getElementById('check-btn').style.display = "block";
    document.getElementById('hint-btn').style.display = "block";
    
    document.querySelectorAll('#drop-area .slot').forEach(s => {
        const label = s.querySelector('.slot-label');
        s.innerHTML = ""; s.appendChild(label);
    });
    const area = document.getElementById('piece-area');
    area.innerHTML = "";
    let words = [];
    q.D.split(' ').forEach(item => { item.split(':')[0].split('_').forEach(w => words.push(w)); });
    words.sort(()=>Math.random()-0.5).forEach(w => createPiece(w, area, false));
}

function createPiece(text, target, hasHint, hintText = "", isDraggable = true) {
    const wrapper = document.createElement('div');
    wrapper.className = 'piece-wrapper';
    const p = document.createElement('div');
    p.className = 'piece'; p.innerText = text; 
    if(isDraggable) {
        p.draggable = true;
        p.ondragstart = (e) => { e.dataTransfer.setData('text', text); p.classList.add('dragging'); };
        p.ondragend = () => p.classList.remove('dragging');
    }
    wrapper.appendChild(p);
    if(hasHint && hintText) {
        const h = document.createElement('div');
        h.className = 'hint-label'; h.innerText = hintText;
        wrapper.appendChild(h);
    }
    target.appendChild(wrapper);
}

document.querySelectorAll('.slot, .piece-container').forEach(zone => {
    zone.ondragover = (e) => e.preventDefault();
    zone.ondrop = (e) => {
        e.preventDefault();
        const dragging = document.querySelector('.dragging');
        if (dragging) zone.appendChild(dragging.parentElement);
    };
});

function checkAnswer() {
    const q = currentSession[currentIndex];
    const slots = document.querySelectorAll('#drop-area .slot');
    const cols = ['G', 'H', 'I', 'J', 'K'];
    let correct = true;

    cols.forEach((col, idx) => {
        const ans = Array.from(slots[idx].querySelectorAll('.piece')).map(p => p.innerText).join(' ').trim().toLowerCase();
        const target = String(q[col]||"").trim().toLowerCase();
        if (ans !== target) correct = false;
    });

    const fb = document.getElementById('feedback');
    if (!studyLogs[q.id]) studyLogs[q.id] = { streak: 0, lastFail: false };

    if (correct) {
        fb.innerText = "⭕ 正解！"; fb.style.color = "var(--success)";
        if (!isHintUsed) { studyLogs[q.id].streak++; studyLogs[q.id].lastFail = false; }
        localStorage.setItem('eng_v5_logs', JSON.stringify(studyLogs));
        setTimeout(goToNextQuestion, 1200);
    } else {
        fb.innerText = "❌ 不正解"; fb.style.color = "var(--error)";
        studyLogs[q.id].streak = 0; studyLogs[q.id].lastFail = true;
        localStorage.setItem('eng_v5_logs', JSON.stringify(studyLogs));
        showModelAnswer(q); 
    }
}

// 【強化ポイント】ヒント生成ロジックと完全に同期
function showModelAnswer(q) {
    const modelSlots = document.querySelectorAll('#model-drop-area .slot');
    const cols = ['G', 'H', 'I', 'J', 'K'];
    
    // D列の定義を解析（phrase: "am not", hint: "〜ではない"）
    const hintPairs = q.D.split(' ').map(item => {
        const [phrase, hint] = item.split(':');
        return { 
            text: phrase.replace(/_/g, ' ').trim(), 
            hint: hint || "" 
        };
    });

    cols.forEach((col, idx) => {
        const label = modelSlots[idx].querySelector('.slot-label');
        modelSlots[idx].innerHTML = ""; 
        modelSlots[idx].appendChild(label);
        
        const targetSentence = String(q[col]||"").trim();
        if (targetSentence) {
            // そのスロットの英文と一致するヒントペアを探す
            // 大文字小文字を区別せず比較
            const pair = hintPairs.find(p => p.text.toLowerCase() === targetSentence.toLowerCase());
            
            if (pair) {
                // ペアが見つかれば、そのテキストとヒントでピースを作成
                createPiece(pair.text, modelSlots[idx], true, pair.hint, false);
            } else {
                // 万が一見つからない場合は、単語にバラしてヒントを結合（バックアップ処理）
                const fallbackHint = targetSentence.split(' ')
                    .map(w => hintPairs.find(p => p.text.toLowerCase() === w.toLowerCase())?.hint || "")
                    .filter(h => h).join('/');
                createPiece(targetSentence, modelSlots[idx], true, fallbackHint, false);
            }
        }
    });

    document.getElementById('model-answer-section').style.display = "block";
    document.getElementById('check-btn').style.display = "none";
    document.getElementById('next-btn').style.display = "block";
    document.getElementById('hint-btn').style.display = "none";
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goToNextQuestion() {
    if(++currentIndex < currentSession.length) showQuestion();
    else { alert("10問終了！"); location.reload(); }
}

function applyHint() {
    isHintUsed = true;
    const q = currentSession[currentIndex];
    const area = document.getElementById('piece-area');
    document.querySelectorAll('#drop-area .slot').forEach(s => {
        const label = s.querySelector('.slot-label');
        s.innerHTML = ""; s.appendChild(label);
    });
    area.innerHTML = "";
    q.D.split(' ').sort(()=>Math.random()-0.5).forEach(item => {
        const [phrase, trans] = item.split(':');
        createPiece(phrase.replace(/_/g, ' '), area, true, trans || "");
    });
    document.getElementById('hint-btn').style.display = "none";
}

function exportData() {
    const blob = new Blob([JSON.stringify(studyLogs)], {type: 'application/json'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'study_record.json'; a.click();
}

function importData() {
    const input = document.createElement('input'); input.type = 'file';
    input.onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (re) => {
            studyLogs = JSON.parse(re.target.result);
            localStorage.setItem('eng_v5_logs', JSON.stringify(studyLogs));
            location.reload();
        };
        reader.readAsText(e.target.files[0]);
    };
    input.click();
}

window.onload = loadData;
</script>
</body>
</html>
